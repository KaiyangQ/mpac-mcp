# fly.io app config for the MPAC Web App Next.js frontend.
#
# Deploy from repo root (NEXT_PUBLIC_API_URL is a *build-time* arg):
#     fly deploy --config deploy/fly-webapp/fly.toml \
#                --dockerfile deploy/fly-webapp/Dockerfile \
#                --build-arg NEXT_PUBLIC_API_URL=https://mpac-web-api.fly.dev
#
# Prerequisites (one-time):
#     fly apps create mpac-web-app
#
# No volume — the Next.js runtime is stateless; all state lives in the
# API's SQLite volume.

app             = "mpac-web-app"
primary_region  = "dfw"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port         = 3000
  force_https           = true
  # OK to let Next idle — it can cold-start in a few seconds, and the
  # frontend has no live state. If you want snappier first-paint, raise
  # `min_machines_running` to 1.
  auto_stop_machines    = "stop"
  auto_start_machines   = true
  min_machines_running  = 0

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"
